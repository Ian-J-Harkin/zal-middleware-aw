version: '3.8'

services:
  # The Epic 4 Node.js Middleware
  zalando-middleware:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - NODE_ENV=production
      # Internal Docker network routing to MinIO
      - MINIO_ENDPOINT=minio
      - MINIO_PORT=9000
      - MINIO_USE_SSL=false
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - MINIO_BUCKET=zalando-media
      # Ensure this points to your local SQL Server instance or a secure remote IP
      - DATABASE_URL=${DATABASE_URL}
      # API Configurations
      - CLIENT_ID=${CLIENT_ID}
      - CLIENT_SECRET=${CLIENT_SECRET}
      - ZALANDO_API_URL=${ZALANDO_API_URL}
    depends_on:
      - minio
    networks:
      - zalando-net

  # The Epic 4 Media Storage CDN
  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001" # MinIO Console UI
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - zalando-net

networks:
  zalando-net:
    driver: bridge

volumes:
  minio_data:
